name = "axim-coding-lab-worker"
main = "src/ingress.ts"
compatibility_date = "2026-07-11"
workers_dev = true

[vars]
ENVIRONMENT = "production"
# Supabase AXiM Core API routing
SUPABASE_URL = "https://[YOUR_SUPABASE_PROJECT].supabase.co"
SUPABASE_LLM_PROXY_URL = "https://[YOUR_SUPABASE_PROJECT].supabase.co/functions/v1/llm-proxy"

# Idempotency & State Caching
[[kv_namespaces]]
binding = "LAB_STATE"
id = "afc3219e3592439b8d3ae6fcb2f40004"

[[kv_namespaces]]
binding = "TASK_LOCKS"
id = "f399b6d9a6e7425aa3cb648e742ab4b8"

# -----------------------------------------------------------------------------
# SECRET VAULTING INSTRUCTIONS (Execute via Cloudflare CLI, do not hardcode):
# -----------------------------------------------------------------------------
# 1. wrangler secret put AXIM_INTERNAL_KEY
# 2. wrangler secret put GITHUB_PAT (Requires repo, workflow, and PR scopes)
# 3. wrangler secret put SUPABASE_SERVICE_ROLE_KEY